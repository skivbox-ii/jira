<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Activity — UJG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/widgets/ujg-user-activity.css">
</head>
<body>
  <nav class="navbar">
    <ul class="navbar-links">
      <li><a href="/sprint">Sprint Health</a></li>
      <li><a href="/analytics">Project Analytics</a></li>
      <li><a href="/timesheet">Timesheet</a></li>
      <li><a href="/timesheet-v0">Timesheet v0</a></li>
      <li><a href="/user-activity" class="nav-active">User Activity</a></li>
      <li><a href="/daily-diligence">Daily Diligence</a></li>
    </ul>
    <div class="navbar-right">
      <span class="navbar-user" id="navUser"></span>
      <a href="/logout" class="navbar-logout">Выйти</a>
    </div>
  </nav>
  <div id="widget-container"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.7/require.min.js"></script>
  <script>define("jquery", [], function() { return jQuery; });</script>
  <script src="/widgets/_ujgCommon.js"></script>
  <script src="/widgets/ujg-user-activity.js"></script>
  <script>
    fetch("/api/session")
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(data) {
        var navUser = document.getElementById("navUser");
        if (!navUser || !data) return;
        navUser.textContent = data.displayName || data.username || "";
      })
      .catch(function() {});
    require(["_ujgUserActivity"], function(Gadget) {
      var API = {
        getGadgetContentEl: function() { return jQuery("#widget-container"); },
        resize: function() {}
      };
      new Gadget(API);
    });
  </script>
</body>
</html>
