<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Analytics — UJG</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/widgets/ujg-project-analytics.css">
</head>
<body>
  <nav class="navbar">
    <ul class="navbar-links">
      <li><a href="/sprint">Sprint Health</a></li>
      <li><a href="/analytics" class="nav-active">Project Analytics</a></li>
      <li><a href="/timesheet">Timesheet</a></li>
      <li><a href="/timesheet-v0">Timesheet v0</a></li>
    </ul>
    <div class="navbar-right">
      <span class="navbar-user" id="navUser"></span>
      <a href="/logout" class="navbar-logout">Выйти</a>
    </div>
  </nav>
  <div class="page-content">
    <div id="widget-container"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.7/require.min.js"></script>
  <script>define("jquery", [], function() { return jQuery; });</script>
  <script src="/widgets/_ujgCommon.js"></script>
  <script src="/widgets/ujg-project-analytics.js"></script>
  <script>
    fetch("/api/session").then(r => r.json()).then(data => {
      document.getElementById("navUser").textContent = data.displayName || data.username || "";
    });
    require(["_ujgProjectAnalytics"], function(Gadget) {
      var API = {
        getGadgetContentEl: function() { return jQuery("#widget-container"); },
        resize: function() {}
      };
      new Gadget(API);
    });
  </script>
</body>
</html>
